name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify Python compilation
        run: python -m py_compile app.py massscriber/__init__.py massscriber/types.py massscriber/exporters.py massscriber/transcriber.py massscriber/ui.py

      - name: Verify UI imports
        run: python -c "from massscriber.ui import build_demo; build_demo(); print('UI_OK')"
