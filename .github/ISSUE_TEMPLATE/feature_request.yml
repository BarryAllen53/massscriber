name: Feature request
description: Suggest an improvement or a new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Clear use cases help prioritize and implement features well.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: I need to process long podcast files with speaker separation...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Add optional speaker diarization with per-speaker subtitle export.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: I tried splitting the audio manually, but it is too slow.

  - type: textarea
    id: context
    attributes:
      label: Extra context
      placeholder: Links, examples, references, or screenshots
